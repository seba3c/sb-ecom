#
logging.level.web=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.security=INFO
logging.level.com.ecommerce.project=INFO
#
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=86400000
spring.app.jwtCookieName=ecommerce-app
spring.app.jwtCookieExpirationSec=86400
#
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
#
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Seed users
spring.app.seed-users[0].username=${ADMIN_USERNAME}
spring.app.seed-users[0].email=${ADMIN_EMAIL:admin@ecommapp.com}
spring.app.seed-users[0].password=${ADMIN_PASSWORD}
spring.app.seed-users[0].roles=ROLE_USER,ROLE_SELLER,ROLE_ADMIN
