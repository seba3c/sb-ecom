name: Gemini CLI

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  gemini:
    # Only run if '@gemini' is in the comment body
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gemini'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini PR Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch PR context
          PR_NUMBER=$(jq -r '.issue.number // .pull_request.number' "$GITHUB_EVENT_PATH")
          PR_BRANCH=$(gh pr view $PR_NUMBER --json headRefName -q .headRefName)
          
          # Checkout the PR branch
          git fetch origin $PR_BRANCH
          git checkout $PR_BRANCH
          
          # Perform the review on the diff against main
          git diff origin/main...$PR_BRANCH | gemini -p "Review these changes for bugs, security issues, and alignment with the project's coding standards. Provide a concise summary and actionable feedback as a PR comment." > review_output.txt
          
          # Post the result as a comment on the PR
          gh pr comment $PR_NUMBER --body-file review_output.txt
